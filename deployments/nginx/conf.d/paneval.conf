upstream backend {
    server 127.0.0.1:8000;
}

map $http_x_forwarded_for $real_ip {
    ~^(\d+\.\d+\.\d+\.\d+) $1;
    default $remote_addr;
}

server {
    listen  80;

    keepalive_timeout 300;
    client_max_body_size 11m;

    charset utf-8;

    add_header "X-UA-Compatible" "IE=Edge";

    # error_page 404 /404.html;
    access_log /data/log/nginx/paneval/access.log;
    error_log /data/log/nginx/paneval/error.log;

    location /api {
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $real_ip;
        proxy_set_header X-Scheme $scheme;
        proxy_read_timeout 300;
        proxy_buffering off;
        proxy_pass http://backend;
    }

    location = /favicon.ico {
        alias /var/www/html/paneval/static/favicon.ico;
    }

    location / {
        root /var/www/html/paneval;
        index index.html;
        try_files $uri /index.html =404;
        expires -1;
    }

    location ^~ /static/ {
        root /var/www/html/paneval;
        expires max;
    }

    location ^~ /assets/ {
        root /var/www/html/paneval;
        expires max;
    }

    location /documents {
        alias /var/www/html/docs/;
        index index.html;
        # try_files $uri /index.html =404;
        expires -1;
    }

    location ^~ /documents/hashmap.json {
        alias /var/www/html/docs/hashmap.json;
        expires -1;
    }

    location ^~ /documents/assets/ {
        alias /var/www/html/docs/assets/;
        expires max;
    }

    location ~* (?:^|/)\. {
        deny all;
    }

    location ~* (?:\.(?:bak|conf|dist|fla|in[ci]|log|psd|sql|sw[op])|~)$ {
        deny all;
    }

    # Media: images, icons, video, audio, HTC
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # CSS and Javascript
    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
