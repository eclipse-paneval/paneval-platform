task: math_500
dataset_path: json
dataset_name: null
dataset_kwargs:
  # data_files: lm-evaluation-harness/lm_eval/tasks/quant_option/quant_option.jsonl
  data_files: {"train": "${LMEVAL_DATASET_DOWNLOAD_PATH}/math_500/test_prm800k_500.jsonl", "test": "${LMEVAL_DATASET_DOWNLOAD_PATH}/math_500/test_prm800k_500.jsonl"}
  # test_split: test
  # split: test
test_split: test
output_type: generate_until
fewshot_config:
  sampler: first_n
doc_to_target: "{{answer}}"
doc_to_text:  "{{problem}}\nPlease reason step by step, and put your final answer within \\boxed{}.\n"
process_results: !function utils.process_results
generation_kwargs:
  temperature: 0.6
  max_gen_toks: 32000
  top_p: 0.95
  # until: '<｜end▁of▁sentence｜>'
  until: []
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
