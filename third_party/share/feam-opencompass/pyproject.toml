[tool.poetry]
name = "feam-opencompass"
version = "0.1.0"
description = ""
authors = ["wanghui <wh_linux@126.com>"]
readme = "README.md"
packages = [{include = "feam_opencompass"}]


[tool.poetry.dependencies]
python = "^3.10"
feam = { path = "../feam" }
opencompass = "^0.5.1"


[tool.poetry.group.dev.dependencies]
pytest = "^7.2.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[[tool.poetry.source]]
name = "aliyun"
url = "https://mirrors.aliyun.com/pypi/simple"

[tool.poetry.plugins]
[tool.poetry.plugins."feam.scenario.nlp"]
"builtin.opencompass.qa.en" = "feam_opencompass.code:CodeScenario"